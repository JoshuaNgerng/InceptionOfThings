---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: gitlab
spec:
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379

---
apiVersion: v1
kind: Service
metadata:
  name: gitlab
  namespace: gitlab
spec:
  selector:
    app: gitlab
  ports:
    # Service stays 80 for Ingress; GitLab Omnibus listens on external_url’s port (8000).
    - port: 80
      targetPort: 8000
  type: ClusterIP
