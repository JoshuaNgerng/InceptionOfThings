apiVersion: v1
kind: Secret
metadata:
  name: app-secret
  namespace: gitlab
type: Opaque
stringData:
  # Used by postgres StatefulSet; change for non-local use.
  # Quote values that contain YAML-special characters (e.g. !).
  POSTGRES_PASSWORD: "Gitlabdev1!"
  # Used for Omnibus gitlab_rails['initial_root_password'] on first DB init only.
  GITLAB_ROOT_PASSWORD: "Gitlabdev1!"
